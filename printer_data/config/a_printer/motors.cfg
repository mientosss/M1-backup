[stepper_x]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 128
rotation_distance: 40   #standard: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
# endstop_pin: ^PC1
position_endstop: -20.3
#position_endstop: 235
position_max: 252.5
position_min: -20.3
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: false

[tmc2209 stepper_x]
uart_pin: PD5
diag_pin: PC1
run_current: 0.700
stealthchop_threshold: 0 #9999
interpolate: False
sense_resistor: 0.110
driver_SGTHRS: 90



[stepper_y]
step_pin: PA15
dir_pin: !PA8
enable_pin: !PD1
microsteps: 128
rotation_distance: 40   #standard: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
# endstop_pin: ^PC3
position_endstop: 246
position_max: 246
position_min: -5
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PD0
diag_pin: PC3
run_current: 0.700
stealthchop_threshold: 0 #9999
interpolate: False
sense_resistor: 0.110
driver_SGTHRS: 90



[stepper_z]
step_pin: PE2
dir_pin: !PE3
enable_pin: !PE0
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_min: -4
position_max: 310

[tmc2209 stepper_z]
uart_pin: PE1
run_current: 0.600
stealthchop_threshold: 9999
interpolate: False
sense_resistor: 0.110



