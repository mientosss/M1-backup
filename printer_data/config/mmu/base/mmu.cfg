[mcu mmu]
serial: /dev/serial/by-id/usb-Klipper_rp2040_454741505B8649CA-if00

[temperature_sensor mmu]
sensor_type: temperature_mcu
sensor_mcu: mmu
min_temp: 0
max_temp: 100

