[gcode_macro _MMU_PURGE_TO_BUCKET_AND_WIPE]
description: Purge do wiaderka + wipe szczotki po zmianie filamentu (wrapper HH)
gcode:
    {% set sequence_vars = printer['gcode_macro _MMU_SEQUENCE_VARS'] %}
    {% set park_vars = printer['gcode_macro _MMU_PARK'] %}
    {% set retracted_length = park_vars.retracted_length %}
    {% set retract_speed = sequence_vars.retract_speed|int %}
    {% set unretract_speed = sequence_vars.unretract_speed|int %}

    {% set toolchange_purge_volume = printer.mmu.toolchange_purge_volume|default(0)|float %}
    {% set extruder_filament_remaining = printer.mmu.extruder_filament_remaining|default(0)|float %}
    {% set filament_diameter = printer.configfile.config.extruder.filament_diameter|float %}
    {% set filament_cross_section = (filament_diameter / 2) ** 2 * 3.1415 %}
    {% set purge_len = (toolchange_purge_volume / filament_cross_section) + extruder_filament_remaining %}
    {% set segment_len = 2.0 %}

    {% set v = printer['gcode_macro _PURGE_WIPE_VARS'] %}
    {% set px = v.purge_x|float %}
    {% set py = v.purge_y|float %}
    {% set wx0 = v.wipe_x_min|float %}
    {% set wx1 = v.wipe_x_max|float %}
    {% set wy0 = v.wipe_y_min|float %}
    {% set wy1 = v.wipe_y_max|float %}
    {% set cx = (wx0 + wx1) / 2.0 %}
    {% set cy = (wy0 + wy1) / 2.0 %}
    {% set z  = v.travel_z|float %}

    # konwersje mm/s -> mm/min (Klipper oczekuje F w mm/min)
    {% set travel_F   = (v.travel_speed|float) * 60.0 %}
    {% set wipe_F     = (v.wipe_speed|float)   * 60.0 %}
    {% set wipe_F_y   = (v.wipe_speed|float) * (v.wipe_y_factor|float) * 60.0 %}
    {% set unretract_F = (unretract_speed|abs) * 60 %}
    {% set retract_F   = (retract_speed|abs)   * 60 %}

    {% set pass_along   = v.wipe_passes_along|int %}
    {% set pass_across  = v.wipe_passes_across|int %}
    {% set outer_loops  = v.wipe_outer_loops|int %}

    SAVE_GCODE_STATE NAME=purgewipe_state
    G90
    G92 E0

    {% if retracted_length > 0 %}
        MMU_LOG MSG="Un-retracting {retracted_length}mm"
        M83
        G1 E{retracted_length} F{unretract_F}
    {% endif %}

    MMU_LOG MSG="Moving to purge bucket at X{px} Y{py}"
    G1 X{px} Y{py} F{travel_F}

    MMU_LOG MSG="Purging {purge_len | round(1)}mm of filament into bucket"
    M83
    {% set num_segments = (purge_len // segment_len) | int %}
    {% set remainder = purge_len - (num_segments * segment_len) %}
    {% for _ in range(num_segments) %}
        __MMU_PURGE_SEGMENT LENGTH={segment_len}
    {% endfor %}
    {% if remainder > 0 %}
        __MMU_PURGE_SEGMENT LENGTH={remainder}
    {% endif %}
    G92 E0
    M82

    {% if retracted_length > 0 %}
        MMU_LOG MSG="Retracting {retracted_length}mm"
        M83
        G1 E-{retracted_length} F{retract_F}
        G92 E0
        M82
    {% endif %}

    # --- zewnętrzna pętla powtórzeń: (wzdłuż + wszerz) ---
   {% for i in range(outer_loops) %}
        {% set loop_idx = i + 1 %}
        MMU_LOG MSG="Wipe loop {loop_idx} / {outer_loops} - along Y (center)"
        G1 X{cx} Y{wy0} F{travel_F}
        {% for _ in range(pass_along) %}
            G1 X{cx} Y{wy1} F{wipe_F_y}
            G1 X{cx} Y{wy0} F{wipe_F_y}
        {% endfor %}

        MMU_LOG MSG="Wipe loop {loop_idx} / {outer_loops} - across X (center)"
        G1 X{wx0} Y{cy} F{travel_F}
        {% for _ in range(pass_across) %}
            G1 X{wx1} Y{cy} F{wipe_F}
            G1 X{wx0} Y{cy} F{wipe_F}
        {% endfor %}
    {% endfor %}
    RESTORE_GCODE_STATE NAME=purgewipe_state
    MMU_LOG MSG="Purging complete (bucket + brush center sweeps x{outer_loops})"
