[gcode_macro MMU_SPOOLMAN_SET]
description: Ustaw bramkę MMU i Spoolman SPOOLID
variable_gate: 0
variable_spoolid: 0

gcode:
  {% set gate = params.GATE|int(default=-1) %}
  {% set spool = params.SPOOLID|int(default=-1) %}

  {% if gate < 0 %}
    {action_raise_error("MMU_SPOOLMAN: brak lub niepoprawny GATE (podaj liczbe calkowita >= 0)")}
  {% endif %}
  {% if spool < 0 %}
    {action_raise_error("MMU_SPOOLMAN: brak lub niepoprawny SPOOLID (podaj liczbe calkowita >= 0)")}
  {% endif %}

  MMU_SPOOLMAN GATE={gate} SPOOLID={spool}